name: ci

on:
  push:
  pull_request:

env:
  # Pinned Sigil compiler release the programs build against.
  SIGIL_VERSION: v1.2.0

jobs:
  sjq:
    name: sjq (build + run + oracle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (oracle) + Boehm GC (Sigil binaries link -lgc)
        run: sudo apt-get update && sudo apt-get install -y jq libgc-dev

      - name: Fetch pinned Sigil toolchain from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/sigil
          gh release download "$SIGIL_VERSION" \
            -R boldfield/sigil \
            -p '*x86_64-unknown-linux-gnu.tar.gz' \
            -D /tmp/sigil --clobber
          tar xzf /tmp/sigil/*.tar.gz -C /tmp/sigil
          BIN_DIR="$(dirname "$(find /tmp/sigil -type f -name sigil)")"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/sigil" --version || true

      - name: Build + test all programs
        run: make test
